import:
  - ~/.config/alacritty/fonts.yml

colors:
  # Default colors
  primary:
    background: '0x0f1419'
    foreground: '0xe6e1cf'

    # Cursor colors
    cursor:
        text: "#1E1E2E" # base
        cursor: "#F5E0DC" # rosewater
    vi_mode_cursor:
        text: "#1E1E2E" # base
        cursor: "#B4BEFE" # lavender

    # Search colors
    search:
        matches:
            foreground: "#1E1E2E" # base
            background: "#A6ADC8" # subtext0
        focused_match:
            foreground: "#1E1E2E" # base
            background: "#A6E3A1" # green
        footer_bar:
            foreground: "#1E1E2E" # base
            background: "#A6ADC8" # subtext0

    # Keyboard regex hints
    hints:
        start:
            foreground: "#1E1E2E" # base
            background: "#F9E2AF" # yellow
        end:
            foreground: "#1E1E2E" # base
            background: "#A6ADC8" # subtext0

    # Selection colors
    selection:
        text: "#1E1E2E" # base
        background: "#F5E0DC" # rosewater

    # Normal colors
    normal:
      black:   '0x000000'
      red:     '0xf34a4a'
      green:   '0xbae67e'
      yellow:  '0xffee99'
      blue:    '0x73d0ff'
      magenta: '0xd4bfff'
      cyan:    '0x83CEC6'
      white:   '0xf2f2f2'

    # Bright colors
    bright:
      black:   '0x737d87'
      red:     '0xff3333'
      green:   '0xc2d94c'
      yellow:  '0xe7c547'
      blue:    '0x59c2ff'
      magenta: '0xb77ee0'
      cyan:    '0x5ccfe6'
      white:   '0xffffff'

    # Dim colors
    dim:
        black: "#45475A" # surface1
        red: "#F38BA8" # red
        green: "#A6E3A1" # green
        yellow: "#F9E2AF" # yellow
        blue: "#89B4FA" # blue
        magenta: "#F5C2E7" # pink
        cyan: "#94E2D5" # teal
        white: "#BAC2DE" # subtext1

    indexed_colors:
        - { index: 16, color: "#FAB387" }
        - { index: 17, color: "#F5E0DC" }
